base_url = "https://example.com"
title = "My Site"
description = "A simple Zola starter site."
default_language = "en"
compile_sass = true
build_search_index = true
generate_feeds = true
feed_filenames = ["atom.xml"]
minify_html = false

[markdown]
highlight_code = true
highlight_theme = "css"
smart_punctuation = true

[slugify]
paths = "on"
taxonomies = "on"
anchors = "on"

[extra]
author = "Arkos"
subtitle = "Simple Zola starter"
show_feed_link = true
